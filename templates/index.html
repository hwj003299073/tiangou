<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻亦舔狗日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f6f7fb;
            padding: 30px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .diary-title {
            font-size: 26px;
            color: #ff4d75;
            text-align: center;
            margin-bottom: 10px;
        }

        .diary-date {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .diary-content {
            background: #fff9fb;
            border-left: 4px solid #ff4d75;
            padding: 25px 20px;
            border-radius: 10px;
            font-size: 17px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
        }

        button {
            padding: 11px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-pink {
            background: #ff4d75;
            color: white;
        }

        .btn-gray {
            background: #f1f3f5;
            color: #333;
        }

        /* 评论区 */
        .comment-title {
            font-size: 19px;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .comment-form input,
        .comment-form textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        .comment-form textarea {
            min-height: 100px;
            resize: vertical;
        }

        .comment-form button {
            background: #3498db;
            color: white;
            align-self: start;
        }

        .comment-item {
            background: #f9f9f9;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .comment-name {
            font-weight: bold;
            color: #ff4d75;
            margin-bottom: 4px;
        }

        .comment-text {
            color: #444;
            line-height: 1.6;
        }

        .tip {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="diary-title">寻亦🐶日记</h1>
        <div class="diary-date" id="showDate"></div>

        <div class="diary-content" id="diary">点击下方获取今日日记</div>

        <div class="btns">
            <button class="btn-pink" onclick="getDiary()">下一条</button>
            <button class="btn-gray" onclick="copyText()">复制</button>
        </div>

        <!-- 评论区 -->
        <div class="comment-title">发表评论</div>
        <div class="comment-form">
            <input type="text" id="name" placeholder="请输入姓名" required>
            <textarea id="content" placeholder="请输入评论内容" required></textarea>
            <button onclick="postComment()">发表评论</button>
        </div>

        <div id="commentList"></div>

        <div class="tip">仅供娱乐，请勿过度深情</div>
    </div>

    <script>
        // 显示当前日期
        document.getElementById("showDate").innerText = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric', month: 'long', day: 'numeric'
        });

        // 获取日记
        async function getDiary() {
            let res = await fetch('/jianheng');
            let data = await res.json();
            document.getElementById('diary').innerText = data.content;
        }

        // 复制
        function copyText() {
            let t = document.getElementById('diary').innerText;
            navigator.clipboard.writeText(t);
            alert('复制成功！');
        }

        // 发表评论（本地存储）
        function postComment() {
            let name = document.getElementById('name').value.trim();
            let content = document.getElementById('content').value.trim();
            if (!name || !content) return;

            let list = document.getElementById('commentList');
            let item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `
                <div class="comment-name">${name}</div>
                <div class="comment-text">${content}</div>
            `;
            list.prepend(item);

            // 清空
            document.getElementById('name').value = '';
            document.getElementById('content').value = '';
        }
    </script>
</body>
</html>
