<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻亦舔狗日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.8;
            color: #333;
            background: #f9f9f9;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .date-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .diary-content {
            font-size: 17px;
            margin-bottom: 40px;
            color: #444;
            min-height: 60px;
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 1px 3px #eee;
        }

        .button-group {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            background-color: #ff8822;
            color: #fff;
        }

        .divider {
            border-bottom: 1px solid #ddd;
            margin: 30px 0;
        }

        .notice-text,
        .opinion-text {
            font-size: 16px;
            margin-bottom: 15px;
            color: #555;
        }

        /* 评论区完整CSS */
        .comment-section {
            margin-top: 30px;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .comment-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .comment-input-area input,
        .comment-input-area textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            background: #fdfdfd;
        }

        .comment-input-area textarea {
            height: 100px;
            resize: vertical;
        }

        .submit-btn {
            padding: 9px 20px;
            background-color: #ff8822;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .comment-item {
            padding: 14px 0;
            border-bottom: 1px dashed #eee;
        }

        .comment-name {
            font-weight: bold;
            color: #2c3e50;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .comment-content {
            color: #444;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <!-- 改成空标签，JS自动赋值 -->
    <div class="date-title" id="autoDate"></div>
    
    <div class="diary-content" id="content">
        点击换一换获取今日情感日记
    </div>
    <div class="button-group">
        <button class="btn" id="changeBtn">换一换</button>
    </div>
    <div class="divider"></div>
    <p class="notice-text">本版块为寻亦我的本人经历。如果有任何想说的，直接在下方说！</p>
    <p class="opinion-text">都说有人看笑话，有人照镜子，其实这个东西在我看来是世间常态，人人都有过为爱卑微、满心执念的时刻，不必嘲讽，也不必轻视</p>

    <div class="comment-section">
        <div class="comment-title">评论区</div>
        <div class="comment-input-area">
            <input type="text" id="name" placeholder="请输入昵称" autocomplete="off">
            <textarea id="commentContent" placeholder="说点什么..." autocomplete="off"></textarea>
            <button class="submit-btn" id="submitComment">提交评论</button>
        </div>
        <div id="commentList"></div>
    </div>

    <script>
        // 自动设置当前日期 格式：xxxx年xx月xx日
        function setNowDate() {
            const now = new Date();
            const year = now.getFullYear();
            // 补零 1→01
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            document.getElementById('autoDate').innerText = `${year}年${month}月${day}日`;
        }

        // 换一换
        document.getElementById('changeBtn').onclick = async () => {
            const res = await fetch('/jianheng');
            const data = await res.json();
            document.getElementById('content').innerText = data.content;
        };

        // 提交评论
        document.getElementById('submitComment').onclick = async () => {
            const name = document.getElementById('name').value.trim();
            const content = document.getElementById('commentContent').value.trim();

            if (!name || !content) {
                alert('昵称和评论内容不能为空');
                return;
            }

            const res = await fetch('/api/comment/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `name=${encodeURIComponent(name)}&content=${encodeURIComponent(content)}`
            });

            const data = await res.json();
            if (data.ok) {
                document.getElementById('commentContent').value = '';
                loadComments();
            } else {
                alert(data.msg);
            }
        };

        // 加载评论
        async function loadComments() {
            const res = await fetch('/api/comment/list');
            const list = await res.json();
            const html = list.map(item => `
                <div class="comment-item">
                    <div class="comment-name">${item.name}</div>
                    <div class="comment-content">${item.content}</div>
                </div>
            `).join('');
            document.getElementById('commentList').innerHTML = html;
        }

        // 页面初始化
        window.onload = () => {
            setNowDate();     // 自动加载日期
            document.getElementById('changeBtn').click();
            loadComments();
        };
    </script>
</body>

</html>
